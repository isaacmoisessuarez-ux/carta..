<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eres mi felicidad</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background-image: url('https://i.pinimg.com/736x/88/56/cf/8856cfc889c6edfb76628d053c65c7f6.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      color: #333;
      overflow: hidden;
    }

    .screen {
      display: none;
      animation: fadeIn 0.8s ease;
      width: 90%;
      max-width: 600px;
      z-index: 2;
    }
    .active {
      display: block;
    }

    .main-img {
      width: 280px;
      height: auto;
      margin-bottom: 15px;
      cursor: pointer;
      transition: transform 0.3s ease;
      border: none;
      box-shadow: none;
    }
    .main-img:hover {
      transform: scale(1.05);
    }

    .card {
      background-color: #fff;
      background-image: url('https://i.pinimg.com/1200x/f0/5b/e4/f05be478111de929e4ec98a07362d3ab.jpg');
      background-size: 100% 100%;
      background-position: top left;
      background-repeat: no-repeat;
      border-radius: 0;
      padding: 52px 78px 44px;
      border: 2px solid #e5e5e5;
      width: 95%;
      max-width: 900px;
      text-align: left;
      margin: 0 auto;
      box-sizing: border-box;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    .card h3 {
      font-family: 'Dancing Script', cursive;
      font-size: 2em;
      text-align: left;
      margin-bottom: 20px;
      margin-left: 10px;
      color: #444;
    }
    .card p {
      font-family: "Poppins", sans-serif;
      font-size: 1.1em;
      line-height: 1.6;
      text-align: justify;
      text-justify: inter-word;
      color: #444;
      margin: 0 0 1em;
    }

    .return-btn {
      margin-top: 25px;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
      background-color: #ff4f81;
      color: white;
    }
    .return-btn:hover {
      background-color: #ff2a66;
    }

    .heart {
      position: absolute;
      bottom: -20px;
      color: pink;
      font-size: 20px;
      animation: float 6s linear forwards;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.95);}
      to {opacity: 1; transform: scale(1);}
    }

    @media (max-width: 600px) {
      .card { padding: 24px 18px 20px; width: 95%; }
      .card h3 { font-size: 1.35em; text-align: center; margin-left: 0; }
      .card p { font-size: 0.92em; line-height: 1.55; text-align: left; }
      .main-img { width: 220px; }
    }
  </style>
</head>
<body>

<audio id="musica" loop>
  <source src="https://github.com/isaacmoisessuarez-ux/carta../raw/main/%C3%81lvaro%20D%C3%ADaz%20-%20Reina%20Pepiada%20(Lyric%20Video).mp3" type="audio/mpeg">
</audio>

  <div class="screen active" id="screen1">
    <img src="https://i.pinimg.com/736x/a1/92/d5/a192d5e43af550b13a2cf7e46fd05cbb.jpg" alt="Correo" class="main-img" onclick="nextScreen(2)">
  </div>

  <div class="screen" id="screen2">
    <img src="https://i.pinimg.com/736x/9f/c6/43/9fc6433cb7a0f57f372518aed30a9100.jpg" alt="Carta" class="main-img" onclick="nextScreen(3)">
  </div>

  <div class="screen" id="screen3">
    <img src="https://i.pinimg.com/736x/df/92/93/df929364c1816ffbeff677819abcf8cf.jpg" alt="Sobre" class="main-img" onclick="nextScreen(5)">
  </div>

  <div class="screen" id="screen5">
    <div class="card">
      <h3>Mi Amorcito</h3>
      
      <p>Mi blanquita preciosa,</p>
      <p><strong>ya es un añito y dos meses</strong></p>
      <p>Amo cada parte de ti mi blanquita preciosa.</p>
      <p>te amo demasiado mi amor y a la vez te extraño mucho mi amor.</p>
      <p>Gracias por estar a mi lado y elegirme aunque estemos enojados</p>
      <p>Hoy, mañana y siempre, te voy a amar con todo mi corazón 💖</p>
      
      <div style="text-align: center;">
        <button class="return-btn" onclick="nextScreen(1)">tu mi reina pepiada</button>
      </div>
    </div>
  </div>

  <script src="corazones.js"></script>
</body>
</html>
